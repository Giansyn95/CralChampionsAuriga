name: Genera cache Fantacalcio

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'index.html'
      - 'data/**/*.csv'
      - 'tools/genera_fantacalcio_cache.js'
      - '.github/workflows/genera-fantacalcio-cache.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installa Playwright Chromium
        run: |
          npm install --no-save playwright-chromium
          npx playwright install --with-deps chromium

      - name: Genera data/fantacalcio_cache.json
        run: node tools/genera_fantacalcio_cache.js

      - name: Commit cache aggiornata
        run: |
          if git diff --quiet -- data/fantacalcio_cache.json; then
            echo "Cache Fantacalcio già aggiornata."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fantacalcio_cache.json
          git commit -m "Aggiorna cache Fantacalcio"
          git push
